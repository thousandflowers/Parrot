name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Install llama.cpp (CLlama system library header)
        run: brew install llama.cpp || brew upgrade llama.cpp || true

      - name: Build
        run: swift build -v 2>&1

      - name: Test
        run: swift test 2>&1

      - name: Lint (SwiftFormat)
        run: |
          if command -v swiftformat &> /dev/null; then
            swiftformat --lint . --reporter github-actions-log
          else
            echo "SwiftFormat not installed — skipping lint"
          fi
        continue-on-error: true
