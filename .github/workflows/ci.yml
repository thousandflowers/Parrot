name: CI

on:
  push:
    branches: [ main, "fix/**", "feat/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build
        run: swift build 2>&1

      - name: Test
        run: swift test 2>&1
